<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户登录</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #152033;
      --muted: #667085;
      --line: #d9e1ec;
      --brand: #2f6fed;
      --brand-dark: #1f55bd;
      --error: #c93636;
      --success: #1f8a55;
      --shadow: 0 18px 45px rgba(42, 62, 92, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(47, 111, 237, 0.14), transparent 32rem),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .login-shell {
      width: min(100%, 980px);
      min-height: 620px;
      display: grid;
      grid-template-columns: 1fr 440px;
      background: var(--panel);
      border: 1px solid rgba(217, 225, 236, 0.78);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .brand-area {
      position: relative;
      padding: 56px;
      background:
        linear-gradient(135deg, rgba(28, 72, 156, 0.92), rgba(47, 111, 237, 0.78)),
        url("data:image/svg+xml,%3Csvg width='640' height='640' viewBox='0 0 640 640' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-opacity='.17' stroke-width='1'%3E%3Cpath d='M40 110h560M40 220h560M40 330h560M40 440h560M40 550h560M110 40v560M220 40v560M330 40v560M440 40v560M550 40v560'/%3E%3C/g%3E%3C/svg%3E");
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      letter-spacing: 0;
      font-size: 20px;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #fff;
      color: var(--brand);
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .brand-copy {
      max-width: 440px;
    }

    .brand-copy h1 {
      margin: 0 0 18px;
      font-size: clamp(34px, 5vw, 52px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .brand-copy p {
      margin: 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: 17px;
      line-height: 1.75;
    }

    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: rgba(255, 255, 255, 0.86);
      font-size: 14px;
    }

    .status-pill {
      padding: 9px 12px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
    }

    .form-area {
      padding: 54px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-header {
      margin-bottom: 30px;
    }

    .form-header h2 {
      margin: 0 0 10px;
      font-size: 30px;
      letter-spacing: 0;
    }

    .form-header p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #344054;
      font-size: 14px;
      font-weight: 650;
    }

    .input-wrap {
      position: relative;
    }

    input {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      background: #fff;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.12);
    }

    .password-toggle {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      border: 0;
      background: transparent;
      color: var(--brand);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 8px;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 6px 0 24px;
      font-size: 14px;
    }

    .remember {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      user-select: none;
    }

    .remember input {
      width: 16px;
      height: 16px;
      accent-color: var(--brand);
    }

    a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 650;
    }

    a:hover {
      text-decoration: underline;
    }

    .submit-btn {
      width: 100%;
      height: 50px;
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-size: 16px;
      font-weight: 750;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      box-shadow: 0 12px 22px rgba(47, 111, 237, 0.28);
    }

    .submit-btn:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .message {
      min-height: 22px;
      margin: 14px 0 0;
      font-size: 14px;
      line-height: 1.55;
    }

    .message.error {
      color: var(--error);
    }

    .message.success {
      color: var(--success);
    }

    .divider {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin: 28px 0 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--line);
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .ghost-btn {
      height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #344054;
      font-weight: 700;
      cursor: pointer;
    }

    .signup {
      margin-top: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 840px) {
      body {
        padding: 16px;
        place-items: start center;
      }

      .login-shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .brand-area {
        min-height: 260px;
        padding: 34px;
      }

      .brand-copy h1 {
        font-size: 34px;
      }

      .form-area {
        padding: 36px 24px;
      }
    }

    @media (max-width: 460px) {
      .brand-area {
        padding: 28px 22px;
      }

      .status-row,
      .form-options,
      .secondary-actions {
        flex-direction: column;
        align-items: stretch;
      }

      .form-options {
        display: grid;
      }

      .secondary-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="login-shell" aria-label="用户登录页面">
    <section class="brand-area">
      <div class="logo" aria-label="云舟系统">
        <span class="logo-mark">Y</span>
        <span>云舟后台</span>
      </div>

      <div class="brand-copy">
        <h1>欢迎回来</h1>
        <p>登录你的账户，继续管理数据、团队和业务流程。页面已适配电脑与手机端。</p>
      </div>

      <div class="status-row" aria-label="系统状态">
        <span class="status-pill">安全连接</span>
        <span class="status-pill">多端同步</span>
        <span class="status-pill">7x24 在线</span>
      </div>
    </section>

    <section class="form-area">
      <div class="form-header">
        <h2>用户登录</h2>
        <p>请输入账号信息进入系统。</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="account">账号 / 邮箱</label>
          <input id="account" name="account" type="text" autocomplete="username" placeholder="请输入账号或邮箱" />
        </div>

        <div class="field">
          <label for="password">密码</label>
          <div class="input-wrap">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
            <button class="password-toggle" type="button" aria-controls="password" aria-label="显示或隐藏密码">显示</button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox" name="remember" />
            记住我
          </label>
          <a href="#" aria-label="找回密码">忘记密码？</a>
        </div>

        <button class="submit-btn" type="submit">登录</button>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </form>

      <div class="divider">或使用</div>

      <div class="secondary-actions">
        <button class="ghost-btn" type="button">手机号登录</button>
        <button class="ghost-btn" type="button">企业微信</button>
      </div>

      <p class="signup">还没有账号？ <a href="#">立即注册</a></p>
    </section>
  </main>

  <script>
    const form = document.querySelector("#loginForm");
    const account = document.querySelector("#account");
    const password = document.querySelector("#password");
    const message = document.querySelector("#message");
    const toggle = document.querySelector(".password-toggle");

    toggle.addEventListener("click", () => {
      const isHidden = password.type === "password";
      password.type = isHidden ? "text" : "password";
      toggle.textContent = isHidden ? "隐藏" : "显示";
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const accountValue = account.value.trim();
      const passwordValue = password.value.trim();

      message.className = "message";

      if (!accountValue) {
        message.textContent = "请输入账号或邮箱。";
        message.classList.add("error");
        account.focus();
        return;
      }

      if (passwordValue.length < 6) {
        message.textContent = "密码至少需要 6 位。";
        message.classList.add("error");
        password.focus();
        return;
      }

      message.textContent = "登录信息已提交，可在这里接入真实接口。";
      message.classList.add("success");
    });
  </script>
</body>
</html>
